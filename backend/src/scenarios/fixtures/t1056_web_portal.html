<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Web Portal Capture Test</title></head>
<body>
  <h1>Employee Portal</h1>
  <form id="portal-form">
    <input type="email" id="email" autocomplete="email" placeholder="Work email">
    <input type="password" id="portal-password" autocomplete="current-password" placeholder="Password">
    <button type="submit">Access portal</button>
  </form>
  <pre id="portal-log"></pre>
  <script>
    function updateLog() {
      const p = document.getElementById('portal-password').value;
      document.getElementById('portal-log').textContent =
        p ? `portal-log: password=${p} stored` : '';
    }
    document.getElementById('portal-password').addEventListener('input', updateLog);
    document.getElementById('portal-form').addEventListener('submit', (e) => {
      e.preventDefault();
      updateLog();
    });
  </script>
</body>
</html>
