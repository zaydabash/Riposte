<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Dependency Update Panel</title></head>
<body>
  <h1>Package Updates</h1>

  <button id="silent-update">Update silently</button>
  <div id="provenance" style="display:none">Signed by: riposte-ci</div>

    document.getElementById('silent-update').addEventListener('click', () => {
      document.getElementById('update-status').textContent =
        'silent-update completed missing provenance';
    });
  </script>
</body>
</html>
